# r5_pcsr.cfg — OpenOCD config for P9 (ARM Cortex-R5 r1p3, SWD)  [v8.0]
#
# J-Link connect 로 확인된 구성:
#   SW-DP ID 0x6BA02477, AP[0] = APB-AP 단일 (AP[1] 없음)
#   ROMTbl: 0x80020000(ROM) → 0x80030000 Cortex-R5  (단일코어)
#   DBGPCSR 미구현 → coverage 는 halt 샘플링(halt→reg pc→resume)으로 수집.
#
# P9 는 sampler_type='halt'. Python(OpenOCDHaltSampler._send_startup_tcl)이
#   'r5.dap dpreg ...'(DP power-up/sticky clear) + 'targets r5'(cortex_r 선택) 를 보내고,
#   매 샘플마다 'halt; reg pc; resume' 를 cortex_r 타깃 'r5' 로 보낸다.
#   → cortex_r 타깃 이름은 tcl_prefix('r5') 와 반드시 일치해야 함.

adapter driver jlink
transport select swd
adapter speed 4000
reset_config none

# SWD DAP (DPIDR 0x6BA02477 은 OpenOCD 가 자동 검출)
swd newdap r5 cpu -enable
dap create r5.dap -chain-position r5.cpu

# Cortex-R5 코어 타깃 (halt/reg pc/resume 대상). dbgbase = Debug Unit(0x80030000).
# 사용자 검증: targets r5 → halt → reg pc → PC 읽힘 ✓
target create r5 cortex_r4 -dap r5.dap -ap-num 0 -dbgbase 0x80030000

# APB mem-AP (선택): 디버그 레지스터 직접 읽기용. halt 샘플러는 사용 안 함.
target create r5.abp mem_ap -dap r5.dap -ap-num 0

init

# 참고: CDBGPWRUPREQ/CSYSPWRUPREQ(dpreg 4 0x50000000) + sticky clear(dpreg 0 0x1e) 는
# Python _send_startup_tcl 이 런타임에 보냄.
