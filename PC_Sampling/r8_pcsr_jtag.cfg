transport select jtag
adapter driver jlink
adapter speed 4000
reset_config none

# ARM Cortex-R8 JTAG tap
# IDCODE: 0x6BA00477, IR length: 4 (ARM 표준)
jtag newtap r8 cpu -irlen 4 -expected-id 0x6BA00477

dap create r8.dap -chain-position r8.cpu
target create r8.abp mem_ap -dap r8.dap -ap-num 0
target create r8.axi mem_ap -dap r8.dap -ap-num 1
init

# JTAG+mem_ap는 OpenOCD가 CDBGPWRUPREQ를 자동 설정하지 않음.
# DP CTRL/STAT(0x4): bit30=CSYSPWRUPREQ | bit28=CDBGPWRUPREQ = 0x50000000
r8.dap dpreg 4 0x50000000
after 100
# DP ABORT(0x0): sticky error 클리어 (0x1e = ORUNERRCLR|WDERRCLR|STKERRCLR|STKCMPCLR)
r8.dap dpreg 0 0x1e
