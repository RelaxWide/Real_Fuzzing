# r5_pcsr.cfg — OpenOCD config for P9 (ARM Cortex-R5, SWD)  [v8.0]
#
# PCSR(DBGPCSR) 비침습 PC 샘플링용. Python 쪽(_send_startup_tcl)이
# 'r5.dap' / 'r5.abp' / 'r5.axi' target object 이름으로 명령을 보낸다
# (PRODUCT_PROFILES['P9']['tcl_prefix']='r5' 와 반드시 일치해야 함).
#
# ⚠ 아래 '????' / TODO 는 R5 bring-up 후 실제 값으로 채울 것. (P9_BRINGUP.md 참조)
#   - SWD DPIDR (-expected-id)
#   - APB-AP / AXI-AP 의 ap-num (R8 은 APB=0, AXI=1)
# 베이스: r8_pcsr.cfg(SWD) / r8_pcsr_jtag.cfg 구조.

adapter driver jlink
transport select swd
adapter speed 4000
reset_config none

# ── SWD DAP ──────────────────────────────────────────────────────────
# expected-id 는 R5 SWD DPIDR. 모르면 처음엔 줄 통째로 주석 처리하고
# OpenOCD 가 자동 검출하게 한 뒤, 로그의 DPIDR 값을 여기에 고정한다.
swd newdap r5 cpu -enable
# swd newdap r5 cpu -expected-id 0x????????   ;# TODO: R5 SWD DPIDR

dap create r5.dap -chain-position r5.cpu

# ── mem-AP ───────────────────────────────────────────────────────────
# APB-AP: DBGPCSR(CoreBase+offset) 읽기용.  AXI-AP: per-core debug power.
# ap-num 은 R5 DAP 레이아웃에 따라 다를 수 있음 (R8 은 0 / 1).
target create r5.abp mem_ap -dap r5.dap -ap-num 0   ;# TODO: APB ap-num 확인
target create r5.axi mem_ap -dap r5.dap -ap-num 1   ;# TODO: AXI ap-num 확인 (power 불필요면 무시)

init

# 참고: CDBGPWRUPREQ/CSYSPWRUPREQ(dpreg 4 0x50000000) + sticky clear(dpreg 0 0x1e)
# 와 per-core power-up(AXI write)은 Python _send_startup_tcl 이 런타임에 보낸다.
# (power_addr/power_mask 가 None 이면 power-up 단계는 생략됨.)
